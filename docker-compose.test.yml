services:
  test-db:
    image: postgres:16-alpine
    container_name: vannette-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: vannette_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d vannette_test"]
      interval: 2s
      timeout: 5s
      retries: 10
