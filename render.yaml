databases:
  - name: vannettevoo-db
    plan: free
    databaseName: vannettevoo
    user: vannettevoo

services:
  - type: web
    name: vannettevoo
    runtime: node
    plan: free
    repo: https://github.com/saykeyo-creator/vannettevoo.git
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma migrate resolve --applied 20260309_init 2>/dev/null; npm run build && npx tsx prisma/seed.ts
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: vannettevoo-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://vannettevoo.onrender.com
